<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqbal Tool</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div class="container">
    <h1>RN Management Tool <span class="badge">Iqbal</span></h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
        <button class="tab-btn" onclick="showTab('convert')">SQL Helper</button>
        <button class="tab-btn" onclick="showTab('compare')">RN Compare</button>
    </div>

    <div id="dashboard" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple"><span class="material-icons">analytics</span></div>
                <div class="stat-info"><p>Total Unique RN</p><h3 id="dashTotal">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><span class="material-icons">check_circle</span></div>
                <div class="stat-info"><p>PD101 Presence</p><h3 id="dash101">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><span class="material-icons">fact_check</span></div>
                <div class="stat-info"><p>PD301 Presence</p><h3 id="dash301">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold"><span class="material-icons">description</span></div>
                <div class="stat-info"><p>JSON Ready</p><h3 id="dashJson">0</h3></div>
            </div>
        </div>

        <div class="chart-box">
            <div class="progress-container">
                <div id="progressBar" class="progress-bar" style="width: 0%;">0%</div>
            </div>
            <p id="progressText" style="margin-top:10px; font-size: 0.85rem; color: #555;">Ready for data.</p>
        </div>
    </div>

    <div id="convert" class="tab-content">
        <textarea id="convertInput" placeholder="Paste RNs here..."></textarea>
        <div class="btn-group">
            <button onclick="convertToSQL()">Add SQL Quotes</button>
            <button onclick="convertToBase()" class="btn-secondary">Remove Formatting</button>
            <button onclick="copyOutput()" class="btn-success">Copy</button>
            <button onclick="clearConvert()" class="btn-danger">Clear</button>
        </div>
        <div style="font-size: 0.8rem; margin-bottom: 5px;">Rows: <span id="totalInput">0</span></div>
        <textarea id="convertOutput" readonly placeholder="Result..."></textarea>
    </div>

    <div id="compare" class="tab-content">
        <div class="grid">
            <div class="input-field"><label>Master List</label><textarea id="rnNumber"></textarea></div>
            <div class="input-field"><label>PD101</label><textarea id="pd101"></textarea></div>
            <div class="input-field"><label>PD301</label><textarea id="pd301"></textarea></div>
            <div class="input-field"><label>JSON Mapping</label><textarea id="jsonFile"></textarea></div>
        </div>
        
        <div class="btn-group">
            <button onclick="compareRN()">Compare</button>
            <button onclick="downloadCSV()" class="btn-secondary">CSV</button>
            <button onclick="downloadPDF()" class="btn-success">PDF Report</button>
            <button onclick="clearCompare()" class="btn-danger">Clear All</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>No</th><th>RN Number</th><th>PD101</th><th>PD301</th><th>Json Mapping</th></tr>
                </thead>
                <tbody id="resultTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
