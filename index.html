<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iqbal Tool - RN Management</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #64748b;
            --success: #22c55e;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h1 { color: #1e293b; display: flex; align-items: center; gap: 10px; margin-top: 0; }
        .badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 50px; font-size: 0.4em; text-transform: uppercase; letter-spacing: 1px; }

        /* Tabs Navigation */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .tab-btn {
            padding: 12px 24px; border: none; background: none; cursor: pointer;
            font-weight: 600; color: var(--secondary); transition: all 0.3s;
        }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: white; padding: 20px; border-radius: 15px; display: flex;
            align-items: center; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .stat-icon { padding: 12px; border-radius: 12px; color: white; display: flex; }
        .purple { background: #8b5cf6; } .green { background: #10b981; }
        .blue { background: #3b82f6; } .gold { background: #f59e0b; }
        .stat-info p { margin: 0; font-size: 0.85rem; color: var(--secondary); }
        .stat-info h3 { margin: 0; font-size: 1.5rem; }

        /* Inputs & Textareas */
        textarea {
            width: 100%; height: 150px; padding: 15px; border-radius: 12px;
            border: 1px solid #e2e8f0; font-family: 'Monaco', 'Consolas', monospace;
            box-sizing: border-box; margin-bottom: 15px; resize: vertical;
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .input-field label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button {
            padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
            font-weight: 600; transition: 0.2s; background: var(--primary); color: white;
        }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary { background: var(--secondary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }

        /* Tables */
        .table-container { overflow-x: auto; background: white; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f8fafc; padding: 12px; color: #64748b; font-weight: 600; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; }
        .status-pill { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        .found { background: #dcfce7; color: #166534; }
        .missing { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

<div class="container">
    <h1>RN Management Tool <span class="badge">Iqbal</span></h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
        <button class="tab-btn" onclick="showTab('convert')">SQL Helper</button>
        <button class="tab-btn" onclick="showTab('compare')">RN Compare</button>
    </div>

    <div id="dashboard" class="tab-content active">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon purple"><span class="material-icons">analytics</span></div>
                <div class="stat-info"><p>Total Unique RN</p><h3 id="dashTotal">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><span class="material-icons">check_circle</span></div>
                <div class="stat-info"><p>PD101 Presence</p><h3 id="dash101">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><span class="material-icons">fact_check</span></div>
                <div class="stat-info"><p>PD301 Presence</p><h3 id="dash301">0</h3></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon gold"><span class="material-icons">description</span></div>
                <div class="stat-info"><p>JSON Ready</p><h3 id="dashJson">0</h3></div>
            </div>
        </div>
    </div>

    <div id="convert" class="tab-content">
        <textarea id="convertInput" placeholder="Paste RNs (one per line)..."></textarea>
        <div class="btn-group">
            <button onclick="convertToSQL()">Add SQL Quotes</button>
            <button onclick="copyOutput()" class="btn-success">Copy Result</button>
            <button onclick="clearConvert()" class="btn-danger">Clear</button>
        </div>
        <textarea id="convertOutput" readonly placeholder="SQL ready output..."></textarea>
    </div>

    <div id="compare" class="tab-content">
        <div class="grid">
            <div class="input-field"><label>Master RN List</label><textarea id="rnNumber"></textarea></div>
            <div class="input-field"><label>PD101 List</label><textarea id="pd101"></textarea></div>
            <div class="input-field"><label>PD301 List</label><textarea id="pd301"></textarea></div>
            <div class="input-field"><label>JSON Mapping List</label><textarea id="jsonFile"></textarea></div>
        </div>
        
        <div class="btn-group">
            <button onclick="compareRN()">Run Comparison</button>
            <button onclick="downloadPDF()" class="btn-success">Download PDF</button>
            <button onclick="clearCompare()" class="btn-danger">Clear All</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr><th>No</th><th>RN Number</th><th>PD101</th><th>PD301</th><th>JSON</th></tr>
                </thead>
                <tbody id="resultTable"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function convertToSQL() {
        const input = document.getElementById('convertInput').value;
        const lines = input.split(/\n/).map(l => l.trim()).filter(l => l !== "");
        const formatted = lines.map(l => `'${l}'`).join(',\n');
        document.getElementById('convertOutput').value = formatted;
    }

    function copyOutput() {
        const out = document.getElementById('convertOutput');
        out.select();
        document.execCommand('copy');
        alert("Copied to clipboard!");
    }

    function clearConvert() {
        document.getElementById('convertInput').value = '';
        document.getElementById('convertOutput').value = '';
    }

    function compareRN() {
        const getList = (id) => document.getElementById(id).value.split(/\n/).map(s => s.trim()).filter(s => s !== "");
        
        const master = getList('rnNumber');
        const p101 = new Set(getList('pd101'));
        const p301 = new Set(getList('pd301'));
        const jsMap = new Set(getList('jsonFile'));

        const tbody = document.getElementById('resultTable');
        tbody.innerHTML = '';

        let count101 = 0, count301 = 0, countJs = 0;

        master.forEach((rn, index) => {
            const has101 = p101.has(rn);
            const has301 = p301.has(rn);
            const hasJs = jsMap.has(rn);

            if(has101) count101++;
            if(has301) count301++;
            if(hasJs) countJs++;

            const row = `<tr>
                <td>${index + 1}</td>
                <td><strong>${rn}</strong></td>
                <td><span class="status-pill ${has101 ? 'found' : 'missing'}">${has101 ? 'YES' : 'NO'}</span></td>
                <td><span class="status-pill ${has301 ? 'found' : 'missing'}">${has301 ? 'YES' : 'NO'}</span></td>
                <td><span class="status-pill ${hasJs ? 'found' : 'missing'}">${hasJs ? 'YES' : 'NO'}</span></td>
            </tr>`;
            tbody.innerHTML += row;
        });

        // Update Dashboard
        document.getElementById('dashTotal').innerText = master.length;
        document.getElementById('dash101').innerText = count101;
        document.getElementById('dash301').innerText = count301;
        document.getElementById('dashJson').innerText = countJs;
    }

    function clearCompare() {
        ['rnNumber', 'pd101', 'pd301', 'jsonFile'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('resultTable').innerHTML = '';
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("RN Management Tool - Comparison Report", 14, 15);
        doc.autoTable({ html: 'table' });
        doc.save('RN_Report.pdf');
    }
</script>
</body>
</html>
